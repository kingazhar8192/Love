<!DOCTYPE html>
<html>
<head>
    <title>I Love You</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #ff4b5c, #ff758c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            font-size: 50px;
            text-align: center;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px white, 0 0 20px white;
            }
            to {
                text-shadow: 0 0 20px #fff, 0 0 40px #ffccd5;
            }
        }
    </style>
</head>

<body>

    <h1>I LOVE YOU AROOSHA ❤️</h1>

</body>
</html>
