<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Aroosha ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* Background hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}

/* Main content */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

h1 {
  font-size: 45px;
  color: #ff4d6d;
  text-shadow: 0 0 20px #ff4d6d;
}

button {
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

#text {
  margin-top: 20px;
  font-size: 22px;
  min-height: 30px;
}
</style>
</head>

<body>

<div class="container">
  <h1>I LOVE YOU AROOSHA ❤️</h1>
  <button onclick="startLove()">Click Me 💖</button>
  <div id="text"></div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// Floating hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random()*30) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 300);

// Typing effect
let msg = "You are the most special person in my life 💕";
let i = 0;

function startLove() {
  document.getElementById("music").play();

  let interval = setInterval(() => {
    if (i < msg.length) {
      document.getElementById("text").innerHTML += msg.charAt(i);
      i++;
    } else {
      clearInterval(interval);
    }
  }, 50);
}
</script>

</body>
</html>
