<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Maira ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background: radial-gradient(circle at top, #ff4d6d, #6a11cb, #2575fc);
  background-size:400% 400%;
  animation:bg 10s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* floating particles */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation:floatUp 8s linear infinite;
  opacity:0.6;
}

@keyframes floatUp{
  0%{transform:translateY(100vh) scale(0);}
  100%{transform:translateY(-10vh) scale(1);}
}

.card{
  width:90%;
  max-width:680px;
  padding:55px;
  text-align:center;
  border-radius:35px;
  background:rgba(255,255,255,0.10);
  backdrop-filter:blur(25px);
  box-shadow:0 30px 90px rgba(0,0,0,0.4);
  animation:pop 1.2s ease;
}

@keyframes pop{
  from{transform:scale(0.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h1{
  font-size:40px;
  margin-bottom:10px;
  text-shadow:0 0 20px rgba(255,255,255,0.4);
}

#type{
  font-size:18px;
  min-height:30px;
  margin-bottom:15px;
  opacity:0.95;
}

p{
  font-size:16px;
  margin:6px 0;
  opacity:0.9;
}

.highlight{
  font-weight:600;
  margin-top:12px;
  font-size:17px;
  text-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* floating hearts */
.heart{
  position:absolute;
  color:white;
  font-size:16px;
  animation:heart 6s linear infinite;
}

@keyframes heart{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* glow line */
.line{
  width:60%;
  height:2px;
  background:white;
  margin:15px auto;
  opacity:0.4;
}
</style>
</head>

<body>

<div class="card">

  <h1>❤️ For My Universe Maira ❤️</h1>

  <div id="type"></div>

  <div class="line"></div>

  <p>Maira, you are my peace in every chaos ✨</p>
  <p>You are my smile in every sadness 💖</p>
  <p>You are my reason to keep going ❤️</p>

  <p class="highlight">I don’t need the world… I just need you, Maira 💍</p>

  <p class="highlight">Forever yours ❤️</p>

</div>

<script>

// typing effect
let text = "Maira, you are not just special… you are my whole universe ❤️";
let i = 0;

function typeWriter(){
  if(i < text.length){
    document.getElementById("type").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter,40);
  }
}
typeWriter();

// hearts
function hearts(){
  const h=document.createElement("div");
  h.classList.add("heart");
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=Math.random()*22+10+"px";
  h.style.animationDuration=Math.random()*3+3+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}
setInterval(hearts,100);

// particles
function particles(){
  const p=document.createElement("div");
  p.classList.add("particle");
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=Math.random()*5+5+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),8000);
}
setInterval(particles,200);

</script>

</body>
</html>
