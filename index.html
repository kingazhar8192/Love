<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Aroosha ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: linear-gradient(to right, #000000, #1a001a);
  color: white;
  text-align: center;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: #ff4d6d;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh); opacity: 1;}
  100% {transform: translateY(-10vh); opacity: 0;}
}

/* Center content */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

h1 {
  font-size: 50px;
  color: #ff4d6d;
  text-shadow: 0 0 25px #ff4d6d;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px #ff4d6d;}
  to {text-shadow: 0 0 30px #ff1a4d;}
}

button {
  padding: 15px 30px;
  border-radius: 30px;
  border: none;
  background: #ff4d6d;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #ff4d6d;
}

#text {
  margin-top: 20px;
  font-size: 24px;
  min-height: 40px;
}

/* Confetti dots */
.dot {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10vh);}
  100% {transform: translateY(110vh);}
}
</style>
</head>

<body>

<div class="container">
  <h1>I LOVE YOU AROOSHA ❤️</h1>
  <button onclick="startLove()">Click Me 💖</button>
  <div id="text"></div>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
// Hearts animation
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (20 + Math.random()*30) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}, 250);

// Confetti effect
function confetti() {
  for (let i = 0; i < 30; i++) {
    let dot = document.createElement("div");
    dot.className = "dot";
    dot.style.left = Math.random() * 100 + "vw";
    dot.style.background = ["#ff4d6d","#ffffff","#ff99aa"][Math.floor(Math.random()*3)];
    document.body.appendChild(dot);
    setTimeout(() => dot.remove(), 3000);
  }
}

// Typing effect
let msg = "You are my life, my love, my everything Aroosha 💕";
let i = 0;

function startLove() {
  document.getElementById("music").play();
  document.getElementById("text").innerHTML = "";
  i = 0;

  confetti(); // 🎆 effect

  alert("Aroosha ❤️ You are my everything 😘");

  let interval = setInterval(() => {
    if (i < msg.length) {
      document.getElementById("text").innerHTML += msg.charAt(i);
      i++;
    } else {
      clearInterval(interval);
    }
  }, 50);
}
</script>

</body>
</html>
