<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Aroosha ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px white; }
      to { text-shadow: 0 0 20px yellow; }
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      background: white;
      color: #ff4b7d;
      cursor: pointer;
      margin-top: 30px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      background: #ffe6ec;
    }

    #message {
      display: none;
      font-size: 24px;
      margin-top: 30px;
      animation: fadeIn 2s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>

<body>

  <h1>I LOVE YOU AROOSHA ❤️</h1>

  <button onclick="showMessage()">Click Me 💖</button>

  <div id="message">
    You are the most special person in my life 💕
  </div>

  <audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <script>
    function showMessage() {
      document.getElementById("message").style.display = "block";
      document.getElementById("music").play();
    }
  </script>

</body>
</html>
